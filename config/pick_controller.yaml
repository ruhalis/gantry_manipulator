# Camera Pick Controller Configuration
# Used by scripts/camera_pick_controller.py

# --- Gantry serial ---
gantry:
  port: /dev/ttyCH341USB0
  baud: 115200

# --- Arm geometry ---
arm:
  reach_radius_mm: 200.0   # comfortable reach radius
  default_z_mm: -215.0      # default end-effector height
  home_x_mm: 115.0          # arm X at home/origin position (mm)
  home_y_mm: 70.0            # arm Y at home/origin position (mm)

# --- Pick sequence heights (mm) ---
pick:
  approach_z_mm: 50.0       # height to approach above the object
  pick_z_mm: -25.0           # height to close gripper (at object surface)
  place_z_mm: 50.0           # height for placing
  safe_z_mm: 100.0           # safe travel height

# --- Camera ---
camera:
  color_width: 1280
  color_height: 720
  fps: 30
  calibration_file: config/camera_calibration.yaml

# --- YOLO (optional) ---
yolo:
  model_path: ""             # e.g., yolov8n.pt — leave empty to use click mode
  confidence_threshold: 0.5

# --- Class-based sorting (camera_sort_pick.py) ---
sort:
  model_path: best.pt
  confidence_threshold: 0.5
  preview_every_n_frames: 5     # throttle live YOLO overlay (1 = every frame)
  # Map detected class name -> drop-zone world coords in mm.
  # Class names must match the strings reported by your YOLO model.
  class_drop_zones:
    blue: [640.0, 270.0]
    red:  [680.0, 534.0]
  # What to do if a detection's class is not in class_drop_zones:
  #   "skip"  -> ignore the object
  unknown_action: skip
  # Minimum spacing (mm) between two pick targets — drop near-duplicates from
  # the same snapshot (avoids picking the same object twice).
  dedup_radius_mm: 25.0
